    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // =========================================
        // SUPABASE CLIENT
        // =========================================
        const SUPABASE_URL = "https://ircdnnvuavfbvjpifnho.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyY2RubnZ1YXZmYnZqcGlmbmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjg0NzcsImV4cCI6MjA4NzY0NDQ3N30.zcrmFGmzZj7rEAs2U2dSAxnplCXyik5wMsCXrquOgkI";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =========================================
        // HELPER: Box to X/Y (12 cols x 8 rows = 96, or 8x4=32)
        // Data is always L2R standardized. X is 0-indexed column, Y is 0-indexed row.
        // =========================================
        function boxToXY(box, isFutsal = false) {
            const rows = isFutsal ? 4 : 8;
            const b = box - 1;
            return { col: Math.floor(b / rows), row: b % rows };
        }

        // Spatial Helpers (L2R normalized)
        const isInAttackingThird = (locBox, isFutsal) => {
            if (!locBox) return false;
            const { col } = boxToXY(locBox, isFutsal);
            const cols = isFutsal ? 8 : 12;
            return col >= cols - 3;
        };

        const isInPenaltyBox = (locBox, isFutsal) => {
            if (!locBox) return false;
            if (isFutsal) {
                return [30, 31].includes(locBox);
            } else {
                return [91, 92, 93, 94, 83, 84, 85, 86].includes(locBox);
            }
        };

        const isInDefensiveBox = (locBox, isFutsal) => {
            if (!locBox) return false;
            if (isFutsal) {
                return [2, 3].includes(locBox);
            } else {
                return [3, 4, 5, 6, 11, 12, 13, 14].includes(locBox);
            }
        };

        const isInDefensiveThird = (locBox, isFutsal) => {
            if (!locBox) return false;
            if (isFutsal) {
                return locBox <= 12;
            } else {
                return locBox <= 32;
            }
        };

        const isProgressive = (startBox, endBox, isFutsal) => {
            if (!startBox || !endBox) return false;
            const startNode = boxToXY(startBox, isFutsal);
            const endNode = boxToXY(endBox, isFutsal);
            // Must move forward by at least 2 columns
            return endNode.col >= startNode.col + 2;
        };

        // =========================================
        // STATS CALCULATOR
        // =========================================
        function computeStats(events, match) {
            const init = () => ({
                // 1. Overview
                goals: 0, shots: 0, sot: 0,
                // 2. Passing
                pass_total: 0, pass_success: 0, progressive_passes: 0, key_passes: 0, assists: 0,
                goal_kicks: 0, gk_throws: 0, corners: 0, free_kicks: 0, throw_ins: 0,
                // 3. Attacking
                final_third_entries: 0, box_entries: 0, shot_creation_actions: 0, deep_completions: 0,
                shots_inside_box: 0, shots_outside_box: 0, shot_free_kicks: 0, shot_penalties: 0,
                // 4. Dribbling & Carry
                dribbles_attempted: 0, dribble_success: 0,
                dribbles_to_box: 0, dribbles_in_att_third: 0, dribbles_lead_to_shot: 0,
                carries_successful: 0,
                progressive_carries: 0,
                // 5. Defense
                tackles: 0, interceptions: 0, fouls: 0, yellow: 0, red: 0,
                tackles_in_box: 0, tackles_in_def_third: 0,
                interceptions_in_box: 0, interceptions_in_def_third: 0,
                recoveries_interception: 0, recoveries_tackle: 0,
                defensive_actions: 0, high_press_actions: 0,
                // 6. Territory
                final_third_passes: 0, attacking_third_actions: 0, box_touches: 0,
                // 7. Possession & Advanced
                chains: 0, chain_events: 0, progressive_carries: 0, xt_generated: 0,
                // Base
                events_count: 0, heatmap: {}, corner_goals: 0, fk_goals: 0, penalty_goals: 0, own_goals: 0
            });

            let home = init(), away = init();
            let maxMinute = 0;
            const keyEvents = [];

            // Expected Threat (xT) Base Proxy Matrix (L2R) - Value increases closer to goal (Cols 0-11)
            // Penalty box gets massive boost. Center gets higher than wings.
            const getXtValue = (box, isFutsal) => {
                if (!box) return 0;
                const { col, row } = boxToXY(box, isFutsal);
                const cols = isFutsal ? 8 : 12;
                const rows = isFutsal ? 4 : 8;
                let value = (col / cols) * 0.1; // Base progression
                if (col >= cols - 3) value += 0.2; // Final 3rd bump
                if (isInPenaltyBox(box, isFutsal)) value += 0.5; // Box bump
                return value;
            };

            // Sequential Tracking Variables
            let currentPossessionTeam = null;
            let currentChainEvents = 0;
            let lastEvent = null;

            const momentumBins = {};

            events.forEach((ev, idx) => {
                const isHome = ev.team_id === match.team_a_id;
                const t = isHome ? home : away;
                t.events_count++;

                const nextEv = events[idx + 1];

                if (ev.match_minute > maxMinute) maxMinute = ev.match_minute;

                if (ev.location_box) {
                    t.heatmap[ev.location_box] = (t.heatmap[ev.location_box] || 0) + 1;
                }

                // Sequential / Chain Logic (Strict)
                const chainBreakingOutcomes = ['Miss', 'Interception', 'Lost Control', 'Unsuccessful', 'Foul', 'Yellow', 'Red'];
                const breaksChain = chainBreakingOutcomes.includes(ev.outcome) || ev.action === 'Shot';

                if (!currentPossessionTeam) {
                    currentPossessionTeam = ev.team_id;
                    currentChainEvents = 1;
                } else if (currentPossessionTeam === ev.team_id) {
                    currentChainEvents++;
                } else {
                    // Team changed naturally
                    const oldT = currentPossessionTeam === match.team_a_id ? home : away;
                    oldT.chains++;
                    oldT.chain_events += currentChainEvents;
                    currentPossessionTeam = ev.team_id;
                    currentChainEvents = 1;
                }

                if (breaksChain) {
                    const currentT = currentPossessionTeam === match.team_a_id ? home : away;
                    currentT.chains++;
                    currentT.chain_events += currentChainEvents;
                    currentPossessionTeam = null; // Next event starts anew
                    currentChainEvents = 0;
                }

                // Advanced Base Parsing
                const endBox = ev.end_location_box;
                const startBox = ev.location_box;

                const enteredFinalThird = !isInAttackingThird(startBox, match.is_futsal) && isInAttackingThird(endBox, match.is_futsal);
                const enteredPenaltyBox = !isInPenaltyBox(startBox, match.is_futsal) && isInPenaltyBox(endBox, match.is_futsal);
                const isProgressiveAction = isProgressive(startBox, endBox, match.is_futsal);
                const inAttThirdStart = isInAttackingThird(startBox, match.is_futsal);
                const inBoxEnd = isInPenaltyBox(endBox, match.is_futsal);

                // Attacking Third Action Share
                if (inAttThirdStart) t.attacking_third_actions++;

                // Box Touches (Strict)
                if (isInPenaltyBox(startBox, match.is_futsal) && ['Pass Received', 'Carry', 'Dribble', 'Shot'].includes(ev.action)) {
                    t.box_touches++;
                }

                // Action-based stats
                const successOutcomes = ['Successful', 'Goal', 'Assist', 'SoT Save', 'SoT Block'];
                const isSuccess = successOutcomes.includes(ev.outcome);

                // Momentum (5-min bins)
                const bin = Math.floor((ev.match_minute || 0) / 5) * 5;
                if (!momentumBins[bin]) momentumBins[bin] = { home: 0, away: 0 };
                if (isSuccess) {
                    momentumBins[bin][isHome ? 'home' : 'away']++;
                }

                // xT Calculation for successful open play movements
                if (isSuccess && startBox && endBox && ['Pass', 'Carry', 'Dribble'].includes(ev.action)) {
                    let xtDiff = getXtValue(endBox, match.is_futsal) - getXtValue(startBox, match.is_futsal);
                    if (xtDiff > 0) t.xt_generated += xtDiff;
                }

                switch (ev.action) {
                    case 'Pass':
                        t.pass_total++;
                        // Tracking specific pass types (Sub-metrics)
                        if (ev.type === 'Goalkick') t.goal_kicks++;
                        if (ev.type === 'Goalkeeper Throw') t.gk_throws++;
                        if (ev.type === 'Corner') t.corners++;
                        if (ev.type === 'Free Kick') t.free_kicks++;
                        if (ev.type === 'Throw-in') t.throw_ins++;

                        // strict checking
                        if (ev.outcome === 'Successful' || ev.outcome === 'Assist') {
                            t.pass_success++;
                            if (isInAttackingThird(endBox, match.is_futsal)) t.final_third_passes++;
                            if (enteredFinalThird) t.final_third_entries++;
                            if (enteredPenaltyBox) t.box_entries++;
                            if (isProgressiveAction) t.progressive_passes++;
                            // Deep Completions: Pass into penalty box (exclude crosses)
                            if (inBoxEnd && ev.type !== 'Cross') t.deep_completions++;
                        }
                        if (ev.outcome === 'Assist') {
                            t.assists++;
                            keyEvents.push({ ...ev, display: 'Assist', emoji: '👟', isHome, player_name: ev.player_name, jersey_number: ev.jersey_number });
                        }
                        if (ev.outcome === 'Interception') {
                            const interceptorTeamId = isHome ? match.team_b_id : match.team_a_id;
                            const interceptorT = isHome ? away : home;
                            interceptorT.interceptions++;
                            interceptorT.defensive_actions++;

                            if (isInDefensiveBox(startBox, match.is_futsal)) interceptorT.interceptions_in_box++;
                            if (isInDefensiveThird(startBox, match.is_futsal)) interceptorT.interceptions_in_def_third++;

                            // Ball Recovery logic
                            if (nextEv && nextEv.team_id === interceptorTeamId) {
                                interceptorT.recoveries_interception++;
                            }

                            const { col } = boxToXY(startBox, match.is_futsal);
                            const cols = match.is_futsal ? 8 : 12;
                            if (col >= cols - 3) interceptorT.high_press_actions++;
                        }
                        break;
                    case 'Shot':
                        t.shots++;
                        if (['Goal', 'SoT Save', 'SoT Block'].includes(ev.outcome)) t.sot++;

                        // Location based shot stats
                        if (isInPenaltyBox(ev.location_box, match.is_futsal)) {
                            t.shots_inside_box++;
                        } else {
                            t.shots_outside_box++;
                        }

                        // Set piece shot stats
                        if (ev.type === 'Free Kick') t.shot_free_kicks++;
                        if (ev.type === 'Penalty') t.shot_penalties++;

                        // Shot Creation Action logic (Strict)
                        if (lastEvent && lastEvent.team_id === ev.team_id) {
                            t.shot_creation_actions++;
                            if (lastEvent.action === 'Dribble' && lastEvent.outcome === 'Successful') {
                                t.dribbles_lead_to_shot++;
                            }
                        }

                        if (ev.outcome === 'Goal') {
                            t.goals++;
                            keyEvents.push({ ...ev, display: 'Goal', emoji: '⚽', isHome, player_name: ev.player_name, jersey_number: ev.jersey_number });
                            if (ev.type === 'Corner') t.corner_goals++;
                            if (ev.type === 'Free Kick') t.fk_goals++;
                            if (ev.type === 'Penalty') t.penalty_goals++;
                        }
                        break;
                    case 'Tackle':
                        t.tackles++;
                        t.defensive_actions++;
                        if (inAttThirdStart) t.high_press_actions++;

                        if (isInDefensiveBox(startBox, match.is_futsal)) t.tackles_in_box++;
                        if (isInDefensiveThird(startBox, match.is_futsal)) t.tackles_in_def_third++;

                        if (ev.outcome === 'Successful') {
                            // Ball Recovery logic
                            if (nextEv && nextEv.team_id === ev.team_id) {
                                t.recoveries_tackle++;
                            }
                        }

                        if (ev.outcome === 'Foul') {
                            t.fouls++;
                        }
                        if (ev.outcome === 'Yellow') {
                            t.yellow++;
                            keyEvents.push({ ...ev, display: 'Yellow Card', emoji: '🟨', isHome, player_name: ev.player_name, jersey_number: ev.jersey_number });
                        }
                        if (ev.outcome === 'Red') {
                            t.red++;
                            keyEvents.push({ ...ev, display: 'Red Card', emoji: '🟥', isHome, player_name: ev.player_name, jersey_number: ev.jersey_number });
                        }
                        break;
                    case 'Carry':
                        if (ev.outcome === 'Successful') {
                            t.carries_successful++;
                            if (enteredFinalThird) t.final_third_entries++;
                            if (enteredPenaltyBox) t.box_entries++;
                            if (isProgressiveAction) t.progressive_carries++;
                        }
                        break;
                    case 'Dribble':
                        t.dribbles_attempted++;
                        if (ev.outcome === 'Successful') {
                            t.dribble_success++;
                            if (!isInPenaltyBox(startBox, match.is_futsal) && isInPenaltyBox(endBox, match.is_futsal)) {
                                t.dribbles_to_box++;
                            }
                            if (isInAttackingThird(startBox, match.is_futsal) || isInAttackingThird(endBox, match.is_futsal)) {
                                t.dribbles_in_att_third++;
                            }
                            if (enteredFinalThird) t.final_third_entries++;
                            if (enteredPenaltyBox) t.box_entries++;
                        }
                        break;
                    case 'Own Goal':
                        t.own_goals++;
                        if (isHome) away.goals++;
                        else home.goals++;
                        keyEvents.push({ ...ev, display: 'Own Goal', emoji: '🔴', isHome, player_name: ev.player_name, jersey_number: ev.jersey_number });
                        break;
                }

                // Track trailing event for sequences
                lastEvent = ev;
            });

            // Close final chain iteration
            if (currentPossessionTeam !== null && currentChainEvents > 0) {
                const oldT = currentPossessionTeam === match.team_a_id ? home : away;
                oldT.chains++;
                oldT.chain_events += currentChainEvents;
            }

            // Sort key events by timestamp
            keyEvents.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

            // Build momentum array
            const momentumData = [];
            for (let i = 0; i <= maxMinute; i += 5) {
                momentumData.push({
                    minute: i,
                    home: momentumBins[i]?.home || 0,
                    away: momentumBins[i]?.away || 0,
                });
            }

            const totalPasses = home.pass_total + away.pass_total;
            const possession = totalPasses === 0 ? 50 : Math.round((home.pass_total / totalPasses) * 100);

            const pct = (n, d) => d === 0 ? 0 : Math.round((n / d) * 100);

            // Win Probability Algorithm (Zero-sum percentage shifting)
            let hProb = 50.0;
            let aProb = 50.0;
            const totalMins = match.is_futsal ? 40 : 90;
            const timePassed = Math.min(maxMinute, totalMins);

            events.forEach(ev => {
                const isHome = ev.team_id === match.team_a_id;
                let shift = 0;

                // Helper to check if event is in attacking 3rd
                const isInAttackingThird = (locBox) => {
                    if (!locBox) return false;
                    const { col } = boxToXY(locBox, match.is_futsal);
                    const cols = match.is_futsal ? 8 : 12;
                    return col >= cols - 3; // Data is saved standardized to L2R
                };

                if (ev.outcome === 'Goal' && ev.action !== 'Own Goal') {
                    shift = 10.0;
                } else if (ev.action === 'Own Goal') {
                    // Own goal gives points to the OTHER team
                    if (isHome) aProb += 10.0, hProb -= 10.0;
                    else hProb += 10.0, aProb -= 10.0;
                } else if (ev.outcome === 'Red') {
                    shift = -7.0; // penalizes the team
                } else if (ev.action === 'Shot') {
                    shift = 2.0; // +2% for any shot that isn't a goal
                } else if (ev.action === 'Pass' && ev.outcome === 'Successful') {
                    shift = isInAttackingThird(ev.location_box) ? 0.5 : 0.3;
                } else if (['Dribble', 'Carry'].includes(ev.action) && ev.outcome === 'Successful') {
                    if (isInAttackingThird(ev.location_box)) shift = 1.0; // +1% for attacking 3rd dribble/carry
                }

                if (shift !== 0) {
                    if (isHome) {
                        hProb += shift;
                        aProb -= shift;
                    } else {
                        aProb += shift;
                        hProb -= shift;
                    }
                }
            });

            // Adjust for winning team over time (0.3% increase per minute winning)
            const diff = home.goals - away.goals;
            if (diff > 0) {
                hProb += (timePassed * 0.3);
                aProb -= (timePassed * 0.3);
            } else if (diff < 0) {
                aProb += (timePassed * 0.3);
                hProb -= (timePassed * 0.3);
            }

            // Cap the percentages perfectly between 1 and 99 so it never breaks the UI
            hProb = Math.max(1, Math.min(99, Math.round(hProb)));
            aProb = 100 - hProb;

            // PPDA: Home PPDA = Away Passes / Home Def Actions
            // A lower PPDA indicates more aggressive pressing
            const ppdaHomeStr = home.defensive_actions === 0 ? "15.0+" : (away.pass_total / home.defensive_actions).toFixed(1);
            const ppdaAwayStr = away.defensive_actions === 0 ? "15.0+" : (home.pass_total / away.defensive_actions).toFixed(1);

            // Field Tilt: Home Final Third Passes / Total Final Third Passes
            const totalFtPasses = home.final_third_passes + away.final_third_passes;
            const fieldTiltHome = pct(home.final_third_passes, totalFtPasses);
            const fieldTiltAway = 100 - fieldTiltHome;

            // Attack Third Action Share
            const totalAttActions = home.attacking_third_actions + away.attacking_third_actions;
            const attThirdHome = pct(home.attacking_third_actions, totalAttActions);
            const attThirdAway = 100 - attThirdHome;

            const homePossLength = home.chains === 0 ? 0 : (home.chain_events / home.chains);
            const awayPossLength = away.chains === 0 ? 0 : (away.chain_events / away.chains);

            // Possession Proxy Algorithm (Share of Total Passes Built-up)
            const passProxyPossession = (home.pass_total + away.pass_total) === 0 ? 50 : pct(home.pass_total, home.pass_total + away.pass_total);

            const passAccHome = pct(home.pass_success, home.pass_total);
            const passAccAway = pct(away.pass_success, away.pass_total);
            const convRateHome = pct(home.goals, home.shots);
            const convRateAway = pct(away.goals, away.shots);

            const dribbleAccHome = pct(home.dribble_success, home.dribbles_attempted);
            const dribbleAccAway = pct(away.dribble_success, away.dribbles_attempted);

            return {
                home, away, maxMinute, keyEvents, possession: passProxyPossession,
                // Passing
                passAccHome,
                passAccAway,
                // Dribbling
                dribbleAccHome,
                dribbleAccAway,
                // Overview
                shotAccHome: pct(home.sot, home.shots),
                shotAccAway: pct(away.sot, away.shots),
                goalConvHome: pct(home.goals, home.shots),
                goalConvAway: pct(away.goals, away.shots),
                // Dribble
                dribbleAccHome: pct(home.dribble_success, home.dribbles_attempted),
                dribbleAccAway: pct(away.dribble_success, away.dribbles_attempted),
                // Pressing
                highPressHome: pct(home.high_press_actions, home.defensive_actions),
                highPressAway: pct(away.high_press_actions, away.defensive_actions),
                convRateHome, convRateAway,
                winProbHome: hProb, winProbAway: aProb,
                isLive: match.status === 'Live',
                // Advanced 
                ppdaHome: parseFloat(ppdaHomeStr) || 0,
                ppdaAway: parseFloat(ppdaAwayStr) || 0,
                fieldTiltHome, fieldTiltAway,
                attThirdHome, attThirdAway,
                homePossLength, awayPossLength
            };
        }

                            <circle cx="32" cy="32" r={r} stroke={color} strokeWidth="4" fill="transparent"
                                strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="square"

                        </svg>
                        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 900 }}>

        function FilteredHeatmap({ events, match, teamId, teamName, color, isEndLocation = false }) {
            const [filterAction, setFilterAction] = useState('Pass');
            const [filterType, setFilterType] = useState('ALL');
            const [filterOutcome, setFilterOutcome] = useState('Successful');

            const isFutsal = match.is_futsal;
            const cols = isFutsal ? 8 : 12;
            const rows = isFutsal ? 4 : 8;
            const totalBoxes = cols * rows;
            const vW = 600, vH = isFutsal ? 300 : 400;
            const bW = vW / cols, bH = vH / rows;

            // Hierarchical Filter Data
            const actions = [...new Set(events.map(e => e.action))].filter(Boolean);
            const availableTypes = [...new Set(events.filter(e => e.action === filterAction).map(e => e.type))].filter(Boolean);
            const availableOutcomes = [...new Set(events.filter(e => e.action === filterAction && (filterType === 'ALL' || e.type === filterType)).map(e => e.outcome))].filter(Boolean);

            const filteredEvents = events.filter(e => {
                if (e.team_id !== teamId) return false;
                const loc = isEndLocation ? e.end_location_box : e.location_box;
                if (!loc) return false;
                if (e.action !== filterAction) return false;
                if (filterType !== 'ALL' && e.type !== filterType) return false;
                if (filterOutcome !== 'ALL' && e.outcome !== filterOutcome) return false;
                return true;
            });

            const counts = {};
            filteredEvents.forEach(e => {
                const loc = isEndLocation ? e.end_location_box : e.location_box;
                counts[loc] = (counts[loc] || 0) + 1;
            });
            const maxCount = Math.max(1, ...Object.values(counts));

            return (
                <div className="mb-8">
                    <div className="flex justify-between items-center mb-2">
                        <div className="text-xs font-black uppercase tracking-tight" style={{ color }}>{teamName} ({isEndLocation ? 'END' : 'START'})</div>
                        <div className="text-[10px] font-black bg-black text-white px-2 py-0.5" style={{ borderRadius: 2 }}>COUNT: {filteredEvents.length}</div>
                    </div>

                    {/* Hierarchical Filters */}
                    <div className="flex flex-wrap gap-1 mb-3 bg-gray-100 p-1" style={{ border: '1px solid #000' }}>
                        <select value={filterAction} onChange={e => { setFilterAction(e.target.value); setFilterType('ALL'); setFilterOutcome('ALL'); }} className="h-map-select">
                            {actions.map(a => <option key={a} value={a}>{a.toUpperCase()}</option>)}
                        </select>
                        <select value={filterType} onChange={e => { setFilterType(e.target.value); setFilterOutcome('ALL'); }} className="h-map-select">
                            <option value="ALL">ALL TYPES</option>
                            {availableTypes.map(t => <option key={t} value={t}>{t.toUpperCase()}</option>)}
                        </select>
                        <select value={filterOutcome} onChange={e => setFilterOutcome(e.target.value)} className="h-map-select">
                            <option value="ALL">ALL OUTCOMES</option>
                            {availableOutcomes.map(o => <option key={o} value={o}>{o.toUpperCase()}</option>)}
                        </select>
                    </div>

                    <div className="pitch-wrap" style={{ position: 'relative' }}>
                        <svg viewBox={`0 0 ${vW} ${vH}`} preserveAspectRatio="xMidYMid meet">
                            {/* Grass & Perimeter */}
                            <rect x="0" y="0" width={vW} height={vH} fill="#fff" stroke="#000" strokeWidth="2" />

                            {/* Heat Cells */}
                            {Array.from({ length: totalBoxes }, (_, i) => {
                                const box = i + 1;
                                const { col, row } = boxToXY(box, isFutsal);
                                const count = counts[box] || 0;
                                const intensity = count / maxCount;
                                return (
                                    <g key={box}>
                                        <rect x={col * bW} y={row * bH} width={bW} height={bH}
                                            fill={count > 0 ? color : 'transparent'}
                                            opacity={count > 0 ? 0.1 + intensity * 0.75 : 0}
                                            stroke="#eee" strokeWidth="0.5" />
                                        {count > 0 && (
                                            <text x={col * bW + bW / 2} y={row * bH + bH / 2 + 4} textAnchor="middle" fontSize="10" fontWeight="900" fill={intensity > 0.5 ? '#fff' : '#000'} opacity="0.9">
                                                {count}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}

                            {/* Pitch Clear Lines */}
                            <line x1={vW / 2} y1="0" x2={vW / 2} y2={vH} stroke="#000" strokeWidth="1" strokeDasharray="4" opacity="0.3" />
                            <circle cx={vW / 2} cy={vH / 2} r={isFutsal ? 40 : 55} fill="none" stroke="#000" strokeWidth="1" strokeDasharray="4" opacity="0.3" />

                            {/* Penalty Boxes */}
                            <rect x="0" y={vH * 0.25} width={vW * 0.15} height={vH * 0.5} fill="none" stroke="#000" strokeWidth="1" opacity="0.3" />
                            <rect x={vW * 0.85} y={vH * 0.25} width={vW * 0.15} height={vH * 0.5} fill="none" stroke="#000" strokeWidth="1" opacity="0.3" />
                        </svg>
                    </div>
                </div>
            );
        }

        function PlayerTable({ keyEvents, match }) {
            const scorers = {};
            const assists = {};
            const cards = {};
            keyEvents.forEach(ev => {
                const name = ev.player_name || 'Unknown';
                const team = ev.isHome ? match.team_a?.name : match.team_b?.name;
                const key = `${name}|${team}`;
                if (ev.display === 'Goal' || ev.display === 'Own Goal') {
                    if (!scorers[key]) scorers[key] = { name, team, count: 0, isOG: ev.display === 'Own Goal' };
                    scorers[key].count++;
                }
                if (ev.display === 'Assist') {
                    if (!assists[key]) assists[key] = { name, team, count: 0 };
                    assists[key].count++;
                }
                if (ev.display === 'Yellow Card' || ev.display === 'Red Card') {
                    if (!cards[key]) cards[key] = { name, team, yellow: 0, red: 0 };
                    if (ev.display === 'Yellow Card') cards[key].yellow++;
                    else cards[key].red++;
                }
            });

            const scorerList = Object.values(scorers).sort((a, b) => b.count - a.count);
            const assistList = Object.values(assists).sort((a, b) => b.count - a.count);
            const cardList = Object.values(cards);

            if (scorerList.length === 0 && assistList.length === 0 && cardList.length === 0) return null;

            return (
                <div className="t-box t-shadow p-3">
                    <div className="text-xs font-black uppercase tracking-widest text-muted mb-3">PLAYER STATS</div>
                    {scorerList.length > 0 && (

                                    <span>{a.name} <span className="text-muted">({a.team})</span></span>
                                    <span className="font-black">{a.count}</span>
                                </div>

                        </div>
                    )}
                    {cardList.length > 0 && (
                        <div>

                                </div>
                            ))}

                    )}

            );

        function HubScreen({ onSelect }) {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                db.from('tournaments').select('*').eq('Is_visible', true).then(({ data }) => {
                    setItems(data || []);
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="text-xs font-bold uppercase tracking-widest animate-pulse">ESTABLISHING CONNECTION...</div>;

            return (
                <div>
                    <div className="text-xs font-bold text-muted uppercase mb-3">AVAILABLE TOURNAMENTS</div>
                    {items.length === 0 && <div className="text-xs text-muted uppercase font-bold">No tournaments available</div>}
                    {items.map((t, i) => (
                        <div key={t.id} className="t-box t-shadow mb-3">
                            <button className="tournament-btn" onClick={() => onSelect(t)}>
                                <span>[{String(i + 1).padStart(2, '0')}] {t.name}</span>
                                <span>→</span>
                            </button>
                        </div>
                    ))}
                </div>
            );
        }

        function MatchListScreen({ tournament, onSelect, onBack }) {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                const { data } = await db.from('matches')
                    .select('*, team_a:teams!team_a_id(*), team_b:teams!team_b_id(*)')
                    .eq('tournament_id', tournament.id)
                    .in('status', ['Live', 'Finished', 'Published'])
                    .order('start_time', { ascending: false });
                setMatches(data || []);
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
                const channel = db.channel('match-list-rt')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, fetchData)
                    .subscribe();
                const interval = setInterval(fetchData, 15000);
                return () => { db.removeChannel(channel); clearInterval(interval); };
            }, [tournament.id]);

            return (
                <div>
                    <div className="flex justify-between items-end gap-2 mb-4">
                        <button className="btn-back" onClick={onBack}>← BACK TO HUB</button>
                        <div className="font-black uppercase text-xs px-2 py-1" style={{ background: '#000', color: '#fff', maxWidth: '60%' }}>
                            <span className="truncate" style={{ display: 'block' }}>{tournament.name}</span>
                        </div>
                    </div>
                    {loading ? (
                        <div className="text-xs font-bold animate-pulse uppercase">RETRIEVING MATCH DATA...</div>
                    ) : matches.length === 0 ? (
                        <div className="text-xs text-muted uppercase font-bold">No matches available yet</div>
                    ) : matches.map(m => {
                        const isLive = m.status === 'Live';
                        const hasScore = m.team_a_score !== null && m.team_b_score !== null;
                        return (
                            <div key={m.id} className="t-box t-shadow match-card" onClick={() => onSelect(m)}>
                                <div className="flex justify-between mb-2 items-center">
                                    {isLive ? (
                                        <span className="text-red font-black text-xs blink">[ LIVE ]</span>
                                    ) : (
                                        <span className="text-muted font-black text-xs">[ {m.status?.toUpperCase() || 'FINAL'} ]</span>
                                    )}
                                    {m.is_futsal && <span className="text-xs font-bold text-muted">FUTSAL</span>}
                                </div>

                                <div className="flex justify-between items-center font-black text-base pb-2 gap-2" style={{ borderBottom: '2px solid #000' }}>
                                    <span className="flex-1 text-left truncate uppercase" style={{ lineHeight: 1.2 }}>{m.team_a?.name}</span>
                                    {hasScore ? (
                                        <span style={{ fontFamily: 'JetBrains Mono', fontSize: 22, fontWeight: 900, letterSpacing: 2 }}>
                                            <span className="text-red">{m.team_a_score}</span>
                                            <span className="text-muted" style={{ margin: '0 4px' }}>:</span>
                                            <span className="text-blue">{m.team_b_score}</span>
                                        </span>
                                    ) : (
                                        <span className="text-xs font-bold px-2 py-1" style={{ background: '#000', color: '#fff' }}>VS</span>
                                    )}
                                    <span className="flex-1 text-right truncate uppercase" style={{ lineHeight: 1.2 }}>{m.team_b?.name}</span>
                                </div>

                                <div className="flex justify-between mt-2 items-center">
                                    <span className="text-muted text-xs font-bold uppercase">{m.details ? m.details.toUpperCase() : ''}</span>
                                    <span className="text-xs font-black uppercase tracking-tight">ENTER →</span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // =========================================
        // DASHBOARD
        // =========================================
        function Dashboard({ match: initialMatch, onBack }) {
            const [match, setMatch] = useState(initialMatch);
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('overview');
            const [selectedHalf, setSelectedHalf] = useState('ALL');
            const [showEndHeatmap, setShowEndHeatmap] = useState(false);

            const fetchEvents = async () => {
                const { data } = await db.from('events').select('*')
                    .eq('match_id', initialMatch.id)
                    .order('timestamp', { ascending: true });
                setEvents(data || []);
                setLoading(false);
            };

            const fetchMatch = async () => {
                const { data } = await db.from('matches')
                    .select('*, team_a:teams!team_a_id(*), team_b:teams!team_b_id(*)')
                    .eq('id', initialMatch.id).single();
                if (data) setMatch(data);
            };

            useEffect(() => {
                fetchEvents();
                fetchMatch();
                const channel = db.channel(`dash-${initialMatch.id}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'events', filter: `match_id=eq.${initialMatch.id}` }, fetchEvents)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `id=eq.${initialMatch.id}` }, fetchMatch)
                    .subscribe();
                const interval = setInterval(() => { fetchEvents(); fetchMatch(); }, 10000);
                return () => { db.removeChannel(channel); clearInterval(interval); };
            }, [initialMatch.id]);

            const stats = useMemo(() => {
                const filtered = events.filter(ev => {
                    if (selectedHalf === 'ALL') return true;
                    if (selectedHalf === '1ST') return ev.half === '1st';
                    if (selectedHalf === '2ND') return ev.half === '2nd';
                    return true;
                });
                return computeStats(filtered, match);
            }, [events, match, selectedHalf]);

            if (loading) return <div className="text-xs font-bold animate-pulse uppercase">SYNCHRONIZING FEED...</div>;

            const teamAName = match.team_a?.name || 'Team A';
            const teamBName = match.team_b?.name || 'Team B';

            // Always compute score from events, not match table
            const scoreA = stats.home.goals;
            const scoreB = stats.away.goals;

            const tabs = ['overview', 'passing', 'attacking', 'dribbling', 'defense', 'advanced', 'heatmap'];

            return (
                <div className="pb-12">
                    {/* Header */}
                    <div className="flex justify-between items-start mb-4">
                        <button className="btn-back" onClick={onBack}>← BACK</button>
                        <div className="text-right">
                            <div className="text-xs font-black px-2 py-1 flex items-center gap-1" style={{ background: '#000', color: '#fff' }}>
                                TIME: {stats.maxMinute}'
                                {stats.isLive && <span className="blink" style={{ width: 6, height: 12, display: 'inline-block', background: '#fff' }}></span>}
                            </div>
                            {match.details && <div className="text-xs font-black text-muted uppercase mt-1">{match.details.toUpperCase()}</div>}
                        </div>
                    </div>

                    {/* Scoreboard */}
                    <div className="t-box t-shadow-lg py-4 mb-6" style={{ background: 'var(--gray-light)' }}>
                        <div className="flex justify-between items-center px-4">
                            <div className="flex-1 text-center" style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 52, fontWeight: 900, lineHeight: 1 }} className="text-red">{scoreA}</div>
                                <div className="text-xs font-black uppercase tracking-tight mt-2 truncate w-full">{teamAName}</div>
                            </div>
                            <div className="px-3 text-center flex flex-col items-center">
                                <div className="text-muted" style={{ fontSize: 32, opacity: 0.2, lineHeight: 1 }}>:</div>
                                <div className="text-muted font-bold text-[10px] mt-2 tracking-widest bg-white border border-black px-2 py-0.5" style={{ borderRadius: 2 }}>
                                    {stats.isLive ? 'LIVE' : 'FINAL'}
                                </div>
                            </div>
                            <div className="flex-1 text-center" style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 52, fontWeight: 900, lineHeight: 1 }} className="text-blue">{scoreB}</div>
                                <div className="text-xs font-black uppercase tracking-tight mt-2 truncate w-full">{teamBName}</div>
                            </div>
                        </div>
                    </div>

                    {/* Half Filter (Only after match ends) */}
                    {!stats.isLive && (
                        <div className="flex gap-1 mb-4 bg-black p-1" style={{ borderRadius: 4 }}>
                            {['ALL', '1ST', '2ND'].map(sh => (
                                <button
                                    key={sh}
                                    onClick={() => setSelectedHalf(sh)}
                                    className={`flex-1 text-[10px] font-black py-1 px-2 ${selectedHalf === sh ? 'bg-white text-black' : 'text-white'}`}
                                    style={{ border: 'none', cursor: 'pointer', transition: '0.2s', borderRadius: 2 }}
                                >
                                    {sh === 'ALL' ? 'FULL MATCH' : `${sh} HALF`}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* Tabs */}
                    <div className="tab-bar">
                        {tabs.map(tab => (
                            <button key={tab} className={`tab-btn ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* Tab Content */}
                    {activeTab === 'overview' && (
                        <div>
                            {stats.isLive && (
                                <div className="t-box t-shadow p-3 mb-4 text-center">
                                    <div className="text-xs font-black uppercase mb-2">WIN PROBABILITY</div>
                                    <div className="flex justify-between items-center text-sm font-black mx-4">
                                        <span className="text-red">{stats.winProbHome}%</span>
                                        <div className="stat-track flex-1 mx-4">
                                            <div className="stat-fill-red" style={{ width: `${stats.winProbHome}%` }}></div>
                                            <div className="stat-fill-blue" style={{ width: `${stats.winProbAway}%` }}></div>
                                        </div>
                                        <span className="text-blue">{stats.winProbAway}%</span>
                                    </div>
                                </div>
                            )}

                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>KEY PERFORMANCE</div>
                                <TugOfWar label="POSSESSION" home={stats.possession} away={100 - stats.possession} />
                                <TugOfWar label="FIELD TILT" home={stats.fieldTiltHome} away={stats.fieldTiltAway} />
                                <CompactStat label="TOTAL SHOTS" homeVal={stats.home.shots} awayVal={stats.away.shots} />
                                <CompactStat label="PASSES SUCCESSFUL" homeVal={stats.home.pass_success} awayVal={stats.away.pass_success} />
                                <CompactStat label="TACKLES & INT" homeVal={stats.home.tackles + stats.home.interceptions} awayVal={stats.away.tackles + stats.away.interceptions} />
                                <CompactStat label="PPDA" homeVal={stats.ppdaHome} awayVal={stats.ppdaAway} />
                                <CompactStat label="CARDS (Y/R)" homeVal={`${stats.home.yellow}/${stats.home.red}`} awayVal={`${stats.away.yellow}/${stats.away.red}`} />
                            </div>

                            <MomentumChart data={stats.momentumData} teamAName={teamAName} teamBName={teamBName} />
                        </div>
                    )}

                    {activeTab === 'passing' && (
                        <div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>PASSING SUMMARY</div>
                                <CompactStat label="TOTAL PASS (SUCCESSFUL)" homeVal={`${stats.home.pass_total} (${stats.home.pass_success})`} awayVal={`${stats.away.pass_total} (${stats.away.pass_success})`} />
                                <CompactStat label="PASS ACCURACY %" homeVal={`${stats.passAccHome}%`} awayVal={`${stats.passAccAway}%`} />
                                <CompactStat label="PROG. PASSES" homeVal={stats.home.progressive_passes} awayVal={stats.away.progressive_passes} />
                                <CompactStat label="ASSISTS" homeVal={stats.home.assists} awayVal={stats.away.assists} />
                                <CompactStat label="PASSES IN ATTACK 3RD" homeVal={stats.home.final_third_passes} awayVal={stats.away.final_third_passes} />
                            </div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>SET PIECES & GK</div>
                                <CompactStat label="GOAL KICKS" homeVal={stats.home.goal_kicks} awayVal={stats.away.goal_kicks} />
                                <CompactStat label="GK THROW" homeVal={stats.home.gk_throws} awayVal={stats.away.gk_throws} />
                                <CompactStat label="CORNERS" homeVal={stats.home.corners} awayVal={stats.away.corners} />
                                <CompactStat label="FREE KICK" homeVal={stats.home.free_kicks} awayVal={stats.away.free_kicks} />
                                <CompactStat label="THROW IN" homeVal={stats.home.throw_ins} awayVal={stats.away.throw_ins} />
                            </div>
                        </div>
                    )}

                    {activeTab === 'attacking' && (
                        <div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>ATTACKING PERFORMANCE</div>
                                <CompactStat label="TOTAL SHOT" homeVal={stats.home.shots} awayVal={stats.away.shots} />
                                <CompactStat label="SHOT ON TARGET" homeVal={stats.home.sot} awayVal={stats.away.sot} />
                                <CompactStat label="CONVERSION RATE" homeVal={`${stats.convRateHome}%`} awayVal={`${stats.convRateAway}%`} />
                                <CompactStat label="SHOT INSIDE BOX" homeVal={stats.home.shots_inside_box} awayVal={stats.away.shots_inside_box} />
                                <CompactStat label="SHOT OUTSIDE BOX" homeVal={stats.home.shots_outside_box} awayVal={stats.away.shots_outside_box} />
                                <CompactStat label="FREE KICK" homeVal={stats.home.shot_free_kicks} awayVal={stats.away.shot_free_kicks} />
                                <CompactStat label="PENALTY" homeVal={stats.home.shot_penalties} awayVal={stats.away.shot_penalties} />
                            </div>
                        </div>
                    )}

                    {activeTab === 'dribbling' && (
                        <div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>DRIBBLING & CARRIES</div>
                                <CompactStat label="SUCCESS DRIBBLES TO BOX" homeVal={stats.home.dribbles_to_box} awayVal={stats.away.dribbles_to_box} />
                                <CompactStat label="SUCCESS DRIBBLES IN ATT 3RD" homeVal={stats.home.dribbles_in_att_third} awayVal={stats.away.dribbles_in_att_third} />
                                <CompactStat label="TOTAL DRIBBLES (SUCCESSFUL)" homeVal={`${stats.home.dribbles_attempted} (${stats.home.dribble_success})`} awayVal={`${stats.away.dribbles_attempted} (${stats.away.dribble_success})`} />
                                <CompactStat label="DRIBBLE SUCCESS %" homeVal={`${stats.dribbleAccHome}%`} awayVal={`${stats.dribbleAccAway}%`} />
                                <CompactStat label="DRIBBLE LEAD TO SHOT" homeVal={stats.home.dribbles_lead_to_shot} awayVal={stats.away.dribbles_lead_to_shot} />
                                <CompactStat label="CARRY" homeVal={stats.home.carries_successful} awayVal={stats.away.carries_successful} />
                            </div>
                        </div>
                    )}

                    {activeTab === 'defense' && (
                        <div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>DEFENSIVE ACTIONS</div>
                                <CompactStat label="TACKLES" homeVal={stats.home.tackles} awayVal={stats.away.tackles} />
                                <CompactStat label="PASS INTERCEPTIONS" homeVal={stats.home.interceptions} awayVal={stats.away.interceptions} />
                                <CompactStat label="TACKLES IN BOX" homeVal={stats.home.tackles_in_box} awayVal={stats.away.tackles_in_box} />
                                <CompactStat label="TACKLES IN DEF 3RD" homeVal={stats.home.tackles_in_def_third} awayVal={stats.away.tackles_in_def_third} />
                                <CompactStat label="PASS INTERCEPT IN BOX" homeVal={stats.home.interceptions_in_box} awayVal={stats.away.interceptions_in_box} />
                                <CompactStat label="PASS INTERCEPT IN DEF 3RD" homeVal={stats.home.interceptions_in_def_third} awayVal={stats.away.interceptions_in_def_third} />
                            </div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>PRESSING INTENSITY</div>
                                <CompactStat label="PPDA" homeVal={stats.ppdaHome} awayVal={stats.ppdaAway} />
                                <CompactStat label="HIGH PRESS %" homeVal={`${stats.highPressHome}%`} awayVal={`${stats.highPressAway}%`} />
                            </div>
                            <div className="text-center text-[3px] text-muted font-bold mt-2 px-2 leading-normal uppercase">
                                * PPDA (Passes Per Defensive Action): (Opponent Passes) / (Defensive Actions).<br />
                                <span className="opacity-75 font-normal">Intuition: Measures pressing intensity. A LOWER number means more aggressive pressing.</span><br />
                                * HIGH PRESS %: (Defensive Actions in Attacking 3rd) / (Total Defensive Actions) * 100.<br />
                                <span className="opacity-75 font-normal">Intuition: Measures how high up the pitch a team defends. A HIGHER % indicates a high-block strategy.</span>
                            </div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>BALL RECOVERIES</div>
                                <CompactStat label="RECOVERY WITH INTERCEPT" homeVal={stats.home.recoveries_interception} awayVal={stats.away.recoveries_interception} />
                                <CompactStat label="RECOVERY WITH TACKLE" homeVal={stats.home.recoveries_tackle} awayVal={stats.away.recoveries_tackle} />
                            </div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>FOULS & DISCIPLINE</div>
                                <CompactStat label="FOULS" homeVal={stats.home.fouls} awayVal={stats.away.fouls} />
                            </div>
                        </div>
                    )}





                    {activeTab === 'advanced' && (
                        <div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>POSSESSION DYNAMICS</div>
                                <CompactStat label="POSSESSION CHAINS" homeVal={stats.home.chains} awayVal={stats.away.chains} />
                                <CompactStat label="AVG POSS. LENGTH" homeVal={stats.homePossLength.toFixed(1)} awayVal={stats.awayPossLength.toFixed(1)} />
                                <CompactStat label="BUILD-UP SPEED" homeVal="-" awayVal="-" />
                            </div>
                            <div className="t-box p-3 mb-4">
                                <div className="text-xs font-black uppercase mb-3" style={{ borderBottom: '2px solid #000', paddingBottom: 4 }}>ADVANCED PLAYMAKING</div>
                                <CompactStat label="PROG. CARRIES" homeVal={stats.home.progressive_carries} awayVal={stats.away.progressive_carries} />
                                <CompactStat label="EXPECTED THREAT (xT)" homeVal={stats.home.xt_generated.toFixed(2)} awayVal={stats.away.xt_generated.toFixed(2)} />
                                <CompactStat label="POSSESSION VALUE" homeVal={stats.home.xt_generated.toFixed(2)} awayVal={stats.away.xt_generated.toFixed(2)} />
                            </div>
                            <div className="text-center text-[3px] text-muted font-bold mt-2 px-2 leading-normal uppercase">
                                * Build-up speed tracks physical tracking markers omitted from standard tags.<br />
                                * xT / Possession Value: Measures scoring probability gained via movements.
                            </div>
                        </div>
                    )}

                    {activeTab === 'heatmap' && (
                        <div>
                            <div className="flex gap-2 mb-4">
                                <button
                                    className={`flex-1 py-2 text-xs font-black uppercase tracking-widest border-2 border-black ${!showEndHeatmap ? 'bg-black text-white' : 'bg-white text-black'}`}
                                    onClick={() => setShowEndHeatmap(false)}
                                    style={{ cursor: 'pointer' }}
                                >
                                    Start Locations
                                </button>
                                <button
                                    className={`flex-1 py-2 text-xs font-black uppercase tracking-widest border-2 border-black ${showEndHeatmap ? 'bg-black text-white' : 'bg-white text-black'}`}
                                    onClick={() => setShowEndHeatmap(true)}
                                    style={{ cursor: 'pointer' }}
                                >
                                    End Locations
                                </button>
                            </div>

                            <FilteredHeatmap events={events} match={match} teamId={match.team_a_id} teamName={teamAName} color="var(--red)" isEndLocation={showEndHeatmap} />
                            <FilteredHeatmap events={events} match={match} teamId={match.team_b_id} teamName={teamBName} color="var(--blue)" isEndLocation={showEndHeatmap} />
                        </div>
                    )}
                </div>
            );
        }

        // =========================================
        // APP ROOT
        // =========================================
        function App() {
            const [view, setView] = useState('hub');
            const [selectedTournament, setSelectedTournament] = useState(null);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [showSplash, setShowSplash] = useState(true);

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2500);
                return () => clearTimeout(timer);
            }, []);

            if (showSplash) return <SplashScreen />;

            return (
                <div className="container">
                    <header className="flex justify-between items-center mb-6 pb-2" style={{ borderBottom: '2px solid #000' }}>
                        <div className="text-xs font-black uppercase tracking-tight">
                            CAC QUICK STATS <span className="text-muted">// ANALYTICS</span>
                        </div>
                        <a href="https://pp33.carrd.co" target="_blank" rel="noopener noreferrer"
                            className="text-xs font-bold uppercase tracking-tight px-2 py-1"
                            style={{ border: '1px solid #000', textDecoration: 'none', color: '#000', transition: 'all 0.15s' }}
                            onMouseOver={e => { e.target.style.background = '#000'; e.target.style.color = '#fff'; }}
                            onMouseOut={e => { e.target.style.background = 'transparent'; e.target.style.color = '#000'; }}>
                            Made by PP33
                        </a>
                    </header>

                    {view === 'hub' && (
                        <HubScreen onSelect={(t) => { setSelectedTournament(t); setView('matches'); }} />
                    )}
                    {view === 'matches' && (
                        <MatchListScreen
                            tournament={selectedTournament}
                            onSelect={(m) => { setSelectedMatch(m); setView('dashboard'); }}
                            onBack={() => setView('hub')}
                        />
                    )}
                    {view === 'dashboard' && (
                        <Dashboard
                            match={selectedMatch}
                            onBack={() => setView('matches')}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
